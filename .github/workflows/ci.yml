name: CI

on:
  push:
    branches: [main, "Phase-*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit & determinism tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: E2E (Playwright)
        # No PLAYWRIGHT_BROWSERS_PATH override: install and test both use the
        # default cache. The config's executablePath is undefined off-sandbox.
        run: npx playwright test
